server {
    listen 80;
    server_name _; # Пока оставляем так для локалки. На проде тут будет домен 

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }



    location /api/generate/stream {
        proxy_pass http://backend_api:8000/api/generate/stream; # Заменить на точный роут  бекенда
        

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;


        proxy_read_timeout 300s; 
    }

    location /api/ {
        proxy_pass http://backend_api:8000/api/; # Убедится, что бекенд ждет запросы с префиксом /api/
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}